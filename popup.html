<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shorts Lens</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>Shorts Lens</h1>
          <p id="statusText">Free mode</p>
        </div>
        <span id="statusBadge" class="badge">Free</span>
      </header>

      <section class="section">
        <label class="label" for="licenseKey">License key</label>
        <div class="license-row">
          <input id="licenseKey" type="text" spellcheck="false" placeholder="SL-XXXX-XXXX-XXXX-XXXXXX">
          <button id="activateButton" type="button">Activate</button>
        </div>
        <p id="licenseMessage" class="hint"></p>
      </section>

      <section class="section pro-section">
        <div class="toggle-row">
          <div>
            <h2>Viral collector</h2>
            <p>Save matching Shorts locally while browsing.</p>
          </div>
          <label class="switch">
            <input id="collectorEnabled" type="checkbox">
            <span></span>
          </label>
        </div>

        <div class="field-grid">
          <label>
            <span>Recent days</span>
            <input id="maxAgeDays" type="number" min="1" step="1">
          </label>
          <label>
            <span>Minimum views</span>
            <input id="minViews" type="number" min="1" step="1000">
          </label>
        </div>
      </section>

      <section class="section library">
        <div class="library-head">
          <div>
            <h2>Local library</h2>
            <p><span id="recordCount">0</span> Shorts collected</p>
          </div>
          <button id="exportButton" type="button">Export CSV</button>
        </div>
        <button id="clearButton" class="secondary" type="button">Clear records</button>
      </section>
    </main>

    <script src="license.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
