<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shorts Lens</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <section class="section">
        <div class="toggle-row">
          <div>
            <h2>爆款收集</h2>
            <p>浏览 Shorts 时自动保存符合规则的视频。</p>
          </div>
          <label class="switch">
            <input id="collectorEnabled" type="checkbox">
            <span></span>
          </label>
        </div>

        <div class="field-grid">
          <label>
            <span>发布日期</span>
            <select id="maxAgeDays">
              <option value="0">不限</option>
              <option value="7">7天内</option>
              <option value="30">30天内</option>
            </select>
          </label>
          <label>
            <span>最低播放量（百万）</span>
            <div class="unit-input">
              <input id="minViews" type="number" min="0" step="0.1">
              <span>M</span>
            </div>
          </label>
        </div>
      </section>

      <section class="section">
        <div class="toggle-row">
          <div>
            <h2>导出后清理</h2>
            <p>导出成功后自动删除本次导出的记录。</p>
          </div>
          <label class="switch">
            <input id="deleteAfterExport" type="checkbox">
            <span></span>
          </label>
        </div>
      </section>

      <section class="section library">
        <div class="library-head">
          <div>
            <h2>最新收集</h2>
            <p>已收集 <span id="recordCount">0</span> 条 Shorts</p>
          </div>
          <button id="openRecordsButton" type="button">收集列表</button>
        </div>
        <ol id="newestRecords" class="record-list"></ol>
        <p id="emptyRecords" class="empty-records">暂无记录。</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
