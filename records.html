<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shorts Lens 记录</title>
    <link rel="stylesheet" href="records.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Shorts Lens</p>
          <h1>爆款 Shorts 记录</h1>
          <p class="subhead">查看本地收集的 Shorts，打开对标视频，并导出 CSV。</p>
          <p class="subhead muted">已勾选记录时只导出勾选项；未勾选时导出当前筛选结果。</p>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">刷新</button>
          <button id="exportButton" type="button">导出 CSV</button>
          <button id="clearButton" class="secondary" type="button">清空</button>
        </div>
      </header>

      <section class="toolbar" aria-label="记录筛选">
        <label>
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、链接或日期">
        </label>
        <label>
          <span>排序</span>
          <select id="sortSelect">
            <option value="collectedAt-desc">最新收集</option>
            <option value="viewsNumber-desc">播放量最高</option>
            <option value="published-desc">最新发布</option>
            <option value="title-asc">标题 A-Z</option>
          </select>
        </label>
        <div class="summary">
          <strong id="selectedCount">0</strong>
          <span>已选</span>
          <strong id="visibleCount">0</strong>
          <span>显示</span>
          <strong id="totalCount">0</strong>
          <span>总计</span>
        </div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="select-col">
                <input id="selectVisible" type="checkbox" aria-label="选择当前可见记录">
              </th>
              <th>收集时间</th>
              <th>播放量</th>
              <th>发布日期</th>
              <th>视频描述</th>
              <th>链接</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
        <div id="emptyState" class="empty" hidden>
          <h2>暂无记录</h2>
          <p>打开 YouTube Shorts 并启用收集后，符合规则的视频会出现在这里。</p>
        </div>
      </section>
    </main>

    <script src="records.js"></script>
  </body>
</html>
